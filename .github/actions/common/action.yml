name: 'Common'
description: 'Here to dry up the workflow'

inputs:
  token:
    description: 'GitHub token for git HTTPS and API (clone k8s repo, or sync merge when enabled)'
    required: true
  run_k8s_setup:
    description: 'When true, resolve release branch and clone pm4-k8s-distribution'
    required: false
    default: 'true'
  run_sync_merge_base:
    description: 'When true, merge PR base into head when behind; may run npm run prod for public-only conflicts and push'
    required: false
    default: 'false'
  package_path:
    description: 'Path under workspace to the package git checkout (used by sync merge only)'
    required: false
    default: '.'

runs:
  using: "composite"
  steps:
    - name: Determine the base branch
      if: ${{ inputs.run_k8s_setup == 'true' }}
      run: |
          default_branch=${{ github.event.repository.default_branch }}
          base_branch=${{ github.event.pull_request.base.ref }}
          release_branch=$default_branch

          match_pattern=release-202[0-9]-[^[:space:]]+
          if [[ $base_branch =~ $match_pattern ]]; then
            release_branch=$base_branch
          fi

          # if the github body contains ci:release-branch: then use that
          match_pattern='ci:release-branch:([^[:space:]]+)'
          if [[ $CI_PR_BODY =~ $match_pattern ]]; then
            release_branch=${BASH_REMATCH[1]}
          fi

          echo "*** Release Branch: $release_branch ***"
          echo "RELEASE_BRANCH=${release_branch}" >> $GITHUB_ENV
      shell: bash

    - name: Clone K8S
      if: ${{ inputs.run_k8s_setup == 'true' }}
      run: |
        k8s_branch=$RELEASE_BRANCH

        match_pattern='ci:k8s-branch:([^[:space:]]+)'
        echo "Checking for $match_pattern in $CI_PR_BODY"
        if [[ $CI_PR_BODY =~ $match_pattern ]]; then
          k8s_branch=${BASH_REMATCH[1]}
        fi

        echo "*** k8s Branch: $k8s_branch ***"
        git clone --depth 1 -b "$k8s_branch" "https://${{ inputs.token }}@github.com/ProcessMaker/pm4-k8s-distribution.git" pm4-k8s-distribution
        echo "versionHelm=$(grep "version:" "pm4-k8s-distribution/charts/enterprise/Chart.yaml" | awk '{print $2}' | sed 's/\"//g')" >> $GITHUB_ENV
      shell: bash

    - name: Sync PR branch with base (merge when behind)
      if: ${{ inputs.run_sync_merge_base == 'true' }}
      env:
        PACKAGE_PATH: ${{ inputs.package_path }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
        HEAD_REF: ${{ github.event.pull_request.head.ref }}
      run: |
        set -euo pipefail
        pkg="${PACKAGE_PATH:-.}"
        cd "$pkg"

        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "::error::Not a git repository at $pkg"
          exit 1
        fi

        git_name="${GH_USER:-github-actions[bot]}"
        git_email="${GH_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
        git config user.name "$git_name"
        git config user.email "$git_email"

        echo "Fetching origin/${BASE_REF}..."
        git fetch origin "$BASE_REF"

        if git merge-base --is-ancestor "origin/${BASE_REF}" HEAD; then
          echo "PR head already contains origin/${BASE_REF}; nothing to merge."
          exit 0
        fi

        echo "PR head is missing commits from origin/${BASE_REF}; merging..."
        set +e
        git merge "origin/${BASE_REF}" --no-edit
        merge_status=$?
        set -e

        if [[ "$merge_status" -eq 0 ]]; then
          echo "Merge completed without conflicts; pushing."
          git push origin "HEAD:refs/heads/${HEAD_REF}"
          exit 0
        fi

        echo "Merge reported conflicts."
        conflicted=()
        while IFS= read -r line; do
          [[ -n "$line" ]] && conflicted+=("$line")
        done < <(git diff --name-only --diff-filter=U || true)

        if [[ ${#conflicted[@]} -eq 0 ]]; then
          echo "No unmerged paths listed; aborting merge."
          git merge --abort || true
          exit 0
        fi

        only_public=true
        for f in "${conflicted[@]}"; do
          case "$f" in
            public|public/*) ;;
            *) only_public=false; break ;;
          esac
        done

        if [[ "$only_public" != true ]]; then
          echo "Conflicts exist outside public/; aborting merge and exiting without failure."
          git merge --abort || true
          exit 0
        fi

        has_prod=false
        if [[ -f package.json ]] && node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.prod?0:1)"; then
          has_prod=true
        fi

        if [[ "$has_prod" != true ]]; then
          echo "No npm run prod available; cannot auto-resolve public conflicts."
          git merge --abort || true
          exit 0
        fi

        set +e
        npm run prod
        prod_status=$?
        set -e
        if [[ "$prod_status" -ne 0 ]]; then
          echo "npm run prod failed during conflict resolution; aborting merge."
          git merge --abort || true
          exit 0
        fi

        if git diff --name-only --diff-filter=U | grep -q .; then
          echo "Conflicts remain after npm run prod; aborting merge."
          git merge --abort || true
          exit 0
        fi

        git add -A
        git commit --no-edit || git commit -m "Merge origin/${BASE_REF} and rebuild public assets"
        git push origin "HEAD:refs/heads/${HEAD_REF}"
        echo "Pushed merge and rebuilt public assets."
      shell: bash
