name: Nightly

on:
  workflow_call:

jobs:
  trivy:
    name: Trivy security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          exit-code: '0'
          vuln-type: os,library
          scanners: vuln

      - name: Convert Trivy JSON to HTML
        run: |
          # 1. Download the official HTML template from the Aqua Security repository
          wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl
          
          # 2. Use the local Trivy CLI binary installed by trivy-action to convert the report
          trivy convert --format template --template "@html.tpl" -o trivy-report.html trivy-results.json

      - name: Upload Trivy scan HTML results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-html
          path: trivy-report.html
          retention-days: 10

      - name: Upload Trivy scan JSON results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-json
          path: trivy-results.json
          retention-days: 10
     