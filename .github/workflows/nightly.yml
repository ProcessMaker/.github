name: Nightly

on:
  workflow_call:

jobs:
  trivy:
    name: Trivy security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: ${{ github.event.repository.name }}.json
          exit-code: '0'
          vuln-type: os,library
          scanners: vuln

      - name: Generate token using ProcessMaker CICD App
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: Iv23liEEWBEvXnSckkld
          private-key: ${{ secrets.PM_CICD_APP_PRIVATE_KEY }}
          owner: ProcessMaker

      - name: Checkout security-scans
        uses: actions/checkout@v4
        with:
          repository: ProcessMaker/security-scans
          token: ${{ steps.app-token.outputs.token }}
          path: security-scans

      - name: Commit and push results
        working-directory: security-scans
        run: |
          cp ../${{ github.event.repository.name }}.json trivy-results/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trivy-results/${{ github.event.repository.name }}.json
          git diff --staged --quiet || git commit -m "Update Trivy results for ${{ github.event.repository.name }}"
          git push
